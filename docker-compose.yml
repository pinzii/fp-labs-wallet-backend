

services:
  # Motor de Base de Datos PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: fplabs_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Interfaz Visual pgAdmin
  pgadmin_ui:
    image: dpage/pgadmin4
    container_name: fplabs_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fplabs.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    restart: unless-stopped

# Volumen para que los datos no se borren si apagamos el contenedor
volumes:
  postgres_data: